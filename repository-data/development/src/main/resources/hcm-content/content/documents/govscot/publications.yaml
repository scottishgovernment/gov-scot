              govscot:metaDescription: First Minister John Swinney's speech at the
                Social Enterprise Scotland Summit at the Surgeons Quarter Quincentenary
                Conference Centre on Thursday 7 November.
              govscot:policyTags: [5808b67565a26906cc73e659, 5a2a6642b637f10e84ce8b17,
                5af1b1a857c59a1688287ddb]
              govscot:prglooslug: social-enterprise-scotland-summit-first-ministers-speech
