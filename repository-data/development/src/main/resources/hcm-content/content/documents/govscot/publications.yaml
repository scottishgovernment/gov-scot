              hippo:name: 'Social Enterprise Scotland Summit: First Minister''s speech'
              hippostd:retainable: false
              hippostd:state: draft
              hippostd:tags: [First Minister, Public Sector, Economy]
              hippostdpubwf:createdBy: system
              hippostdpubwf:creationDate: 2024-11-13T15:50:07.508Z
              hippostdpubwf:lastModificationDate: 2024-11-14T10:10:09.915Z
              hippostdpubwf:lastModifiedBy: system
              hippotranslation:id: 688f7ae9-a724-4d85-9beb-c65e2f744937
              hippotranslation:locale: en
