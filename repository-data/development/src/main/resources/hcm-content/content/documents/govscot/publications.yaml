                  hippostd:content: |-
                    <h3><span><span><span>Tell us what you think</span></span></span></h3>

                    <p><span><span>We are always interested to hear from our users about how our statistics are used, and how they can be improved.</span></span></p>

                    <h3><span><span><span><span><span><strong><span>Feedback survey</span></strong></span></span></span></span></span></h3>

                    <p><span><span>We’d appreciate it if you would complete our short <a href="https://consult.gov.scot/digital-communications/95832709/">feedback survey</a> on this publication.</span></span></p>

                    <h3><span><span><span>Join our mailing list</span></span></span></h3>

                    <p><span><span><span><span>If you would like to receive notification about statistical publications, or find out about consultations on our statistics please join the <a href="http://www.gov.scot/scotstat">ScotStat mailing list</a>. </span></span></span></span></p>

                    <h3><span><span><span>Future publications</span></span></span></h3>

                    <p><span><span><span><span>Details of future publications can be found on our <a href="https://www.gov.scot/publications/official-statistics-forthcoming-publications/">forthcoming publications</a> page.</span></span></span></span></p>

                    <p><span><span><span>The Scottish Government is developing these estimates on an ongoing basis, and is grateful to the ONS which has shared the BICS data.</span></span></span></p>
