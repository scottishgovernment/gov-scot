              /latest-main-findings[1]:
                jcr:primaryType: govscot:PublicationPage
                jcr:mixinTypes: ['mix:referenceable']
                jcr:uuid: 5be143e6-a6bb-46ac-814e-0188424bc5bc
                govscot:contentitemlanguage: en
                govscot:displayDate: 2023-08-04T09:30:00.456+01:00
                govscot:title: Latest main findings
                hippo:availability: []
                hippostd:retainable: false
                hippostd:state: draft
                hippostdpubwf:createdBy: Rachel.Dickie@gov.scot
                hippostdpubwf:creationDate: 2023-08-02T11:23:44.171+01:00
                hippostdpubwf:lastModificationDate: 2023-08-02T11:27:42.850+01:00
                hippostdpubwf:lastModifiedBy: Rachel.Dickie@gov.scot
                hippotranslation:id: aa7dfb63-9a49-4e39-ba9a-c30abb075922
                hippotranslation:locale: document-type-locale
                /govscot:content:
                  jcr:primaryType: hippostd:html
                  hippostd:content: |-
                    <h3><span><span><span>Latest main findings for businesses with 10+ employees and a presence in Scotland</span></span></span></h3>

                    <ul>
                     <li><span><span><span><span>in the period 10 July to 23 July 2023 (Wave 87), 39.4% of businesses reported experiencing a shortage of workers - rising to 48.1% in the Construction industry sector, and 46.1% in the Accommodation &amp; Food Services industry sector</span></span></span></span></li>
                     <li><span><span><span><span>in Wave 87, 55.4% of businesses reported that the shortage of workers has resulted in employees working increased hours</span></span></span></span></li>
                     <li><span><span><span><span>the main concerns for businesses for August 2023 were inflation of goods and services prices (20.9%) and energy prices (19.3%)</span></span></span></span></li>
                     <li><span><span><span><span>of businesses currently trading that have exported in the last 12 months, 23.8% reported exporting less in June 2023 compared to June 2022, and 16.2% reported exporting more</span></span></span></span></li>
                     <li><span><span><span><span>the exporting and importing challenges that were most commonly reported to have increased in June 2023 were changes in transportation costs, changes in exchange rates and additional paperwork– this was the case for both exporting and importing</span></span></span></span></li>
                    </ul>
