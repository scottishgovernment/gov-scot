                /govscot:content:
                  jcr:primaryType: hippostd:html
                  hippostd:content: |-
                    <h3><span><span><span>Business Concerns</span></span></span></h3>

                    <p><span><span><span>In Wave 87, the BICS asked businesses about their main concerns in August 2023.</span></span></span></p>

                    <p><span><span><span>Business concern question: Which of the following, if any, will be the main concern for your business in August 2023?</span></span></span></p>

                    <ul>
                     <li><span><span><span>business rates</span></span></span></li>
                     <li><span><span><span>competition with other UK businesses</span></span></span></li>
                     <li><span><span><span>energy prices</span></span></span></li>
                     <li><span><span><span>exchange rates</span></span></span></li>
                     <li><span><span><span>inflation of goods and services prices</span></span></span></li>
                     <li><span><span><span>interest rates (including mortgages)</span></span></span></li>
                     <li><span><span><span>property rental costs</span></span></span></li>
                     <li><span><span><span>supply chain disruption</span></span></span></li>
                     <li><span><span><span>taxation</span></span></span></li>
                     <li><span><span><span>falling demand of goods and services</span></span></span></li>
                     <li><span><span><span>other</span></span></span></li>
                     <li><span><span><span>not sure</span></span></span></li>
                     <li><span><span><span>no concerns for my business</span></span></span></li>
                    </ul>

                    <p><span><span><strong>Figure 2:&nbsp; The top three concerns for businesses for August 2023 were inflation of goods and services prices (20.9%), energy prices (19.3%) and falling demand for goods and services (15.0%). Comparing to the previous month, fewer businesses are now reporting energy prices as their main concern.&nbsp; </strong></span></span></p>

                    <p><span><span>Estimated share of businesses by main concern for August 2023. Businesses currently trading, with 10+ employees and a presence in Scotland. Wave 87.</span></span></p>

                    <p><span><span><img src="bics-wave-87---figure-2---business-concerns-svg/{_document}/hippogallery:original" alt="A bar chart showing that the main concerns for businesses for August 2023 were inflation of goods and services prices and energy prices." /></span></span></p>

                    <p><span><span><span>Source: <a href="https://www.gov.scot/publications/bics-weighted-scotland-estimates-data-to-wave-87/documents/">BICS Weighted Scotland Estimates - Wave 87</a> from the Scottish Government</span></span></span></p>

                    <p><span><span><span><a href="https://www.gov.scot/publications/bics-weighted-scotland-estimates-data-to-wave-87/documents/">Download the data for this publication (.xlsx, 6.1MB):</a> for Figure 2 data see table ‘BusinessConcern’.</span></span></span></p>
