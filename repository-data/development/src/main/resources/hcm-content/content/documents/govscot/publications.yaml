                /govscot:content:
                  jcr:primaryType: hippostd:html
                  hippostd:content: |-
                    <h3><span><span><span>Introduction</span></span></span></h3>

                    <p><span><span>This is the 69th publication of weighted Scotland estimates from the ONS’ Business Insights and Conditions Survey (BICS).&nbsp; The ONS’ BICS is a voluntary fortnightly business survey, which captures businesses’ responses on how their turnover, workforce, prices, trade and business resilience have been affected by current conditions.</span></span></p>

                    <h3><span><span><span>An Experimental Statistics Publication for Scotland</span></span></span></h3>

                    <p><span><span>The statistics in this publication have been designated as experimental statistics. Experimental statistics are a subset of newly developed or innovative official statistics undergoing evaluation. They are published to involve users and stakeholders in the assessment of their suitability and quality at an early stage. All results are provisional and subject to revision.</span></span></p>

                    <p><span><span><span><span>Further information on Experimental Statistics is published by the <a href="https://uksa.statisticsauthority.gov.uk/about-the-authority/uk-statistical-system/types-of-official-statistics/">UK Statistics Authority</a>.</span></span></span></span></p>
