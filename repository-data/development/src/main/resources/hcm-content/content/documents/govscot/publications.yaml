              /data-and-methodology[1]:
                jcr:primaryType: govscot:PublicationPage
                jcr:mixinTypes: ['mix:referenceable']
                jcr:uuid: 2bfc155e-de12-4df0-acad-1fdbbc48f746
                govscot:contentitemlanguage: en
                govscot:displayDate: 2023-08-04T09:32:33.908+01:00
                govscot:title: Data and Methodology
                hippo:availability: []
                hippostd:retainable: false
                hippostd:state: draft
                hippostdpubwf:createdBy: Rachel.Dickie@gov.scot
                hippostdpubwf:creationDate: 2023-08-02T11:32:44.098+01:00
                hippostdpubwf:lastModificationDate: 2023-08-04T09:32:27.664+01:00
                hippostdpubwf:lastModifiedBy: Rachel.Dickie@gov.scot
                hippotranslation:id: 22156948-0148-47f7-8103-aa418f3e077b
                hippotranslation:locale: document-type-locale
                /govscot:content:
                  jcr:primaryType: hippostd:html
                  hippostd:content: |-
                    <h3><span><span><span>Data and Methodology</span></span></span></h3>

                    <p><span><span><span>BICS stands for the Business Insights and Conditions Survey (BICS) – previous to Wave 24, the survey was called "Business Impact of Coronavirus (COVID-19) Survey". The BICS was renamed to reflect the current question set, which goes wider than the impact of the coronavirus (COVID-19). <a href="https://www.ons.gov.uk/peoplepopulationandcommunity/healthandsocialcare/conditionsanddiseases/articles/businessimpactofcovid19surveyquestions/previousReleases">The questions for each wave are published by the ONS.</a></span></span></span></p>

                    <p><span><span><span>Currently, the main <a href="https://www.ons.gov.uk/economy/economicoutputandproductivity/output/datasets/businessinsightsandimpactontheukeconomy">Scottish BICS results published by the Office for National Statistics</a> are unweighted which means that we can only make inferences about the businesses that have responded. Weighting the BICS responses enables us to produce estimates for Scottish businesses more generally, not just those that have responded. The ONS has provided the Scottish Government with the BICS microdata, which we have used to develop the weighted Scotland estimates. More information on the weighting method we have used for these estimates is provided here: <a href="https://www.gov.scot/publications/bics-weighted-scotland-estimates-data-to-wave-12/">BICS weighted Scotland estimates: data to wave 12.</a></span></span></span></p>

                    <p><span><span><span>The weighted Scotland estimates, in this publication, are for businesses with 10 or more employees. The weighted Scotland estimates are for businesses that have a presence in Scotland, as opposed to only those businesses headquartered in Scotland. Having a presence in Scotland means that the business has a local unit or site (e.g. shop, office, factory) in Scotland. <span><span>In terms of the base of the estimates, 9,846 businesses responded to the Wave 86 BICS UK-wide, and 10,762 businesses responded in Wave 87. In Wave 86, 1,061 of these businesses had a presence in Scotland (1,230 businesses in Wave 87). Excluding the micro businesses (those with less than 10 employees) takes the base down to 977 responding businesses in Wave 86, and 1,140 in Wave 87. </span></span>The weighted Scotland estimates are derived from results collected from UK businesses for the UK as a whole, but weighted by business counts or employment in Scotland - no account is being made for regional differences between business sites.</span></span></span></p>

                    <p><span><span><span>Note that on the 16th of February 2023 ONS published <a href="https://www.ons.gov.uk/businessindustryandtrade/business/businessservices/articles/businessinsightsandimpactontheukandsubnationaleconomy/latest">Business insights and impact on the UK subnational single-site economy - Office for National Statistics (ons.gov.uk)</a> – this provides an analysis of weighted data for areas within the UK (including Scotland). This latest ONS sub-national analysis focusses on single-site businesses. This differs to the approach taken for the Scottish Government estimates presented here which include single-site and multi-site businesses together, and the Scottish Government estimates are constrained to businesses with 10 or more employees.</span></span></span></p>

                    <p><span><span><span>The coverage of the ONS BICS includes most sectors of the Scottish economy; however, the public sector is excluded, as is ‘Section A – Agriculture, forestry &amp; fishing’, ‘Section D – Electricity, gas, steam &amp; air conditioning supply’ and ‘Section K – Financial &amp; insurance activities’.</span></span></span></p>

                    <p><span><span><span><span>The data collected for this publication are available via <a href="https://www.gov.scot/publications/bics-weighted-scotland-estimates-data-to-wave-87/documents/"><span lang="EN-US">background tables</span></a>. Data can also be accessed, by accredited researchers, via the <a href="https://www.ons.gov.uk/aboutus/whatwedo/statistics/requestingstatistics/secureresearchservice">Secure Research Service (SRS)</a>.</span></span></span></span></p>
