                /govscot:content:
                  jcr:primaryType: hippostd:html
                  hippostd:content: |-
                    <h3><span><span><span>Worker Shortages</span></span></span></h3>

                    <p><span><span><span>In Wave 87, businesses were asked whether they are currently experiencing a shortage of workers. An estimated 39.4% of businesses were experiencing a shortage of workers - rising to 48.1% in the Construction industry sector, and 46.1% in the Accommodation &amp; Food Services industry sector.</span></span></span></p>

                    <p><span><span><span>The BICS also asks businesses that are experiencing a shortage of workers, about how their businesses has been affected by this – the specific question asked is shown below.</span></span></span></p>

                    <p><span><span><span>Worker Shortage question: How has the shortage of workers affected your business?</span></span></span></p>

                    <ul>
                     <li><span><span><span>employees working increased hours</span></span></span></li>
                     <li><span><span><span>had to pause trading entirely</span></span></span></li>
                     <li><span><span><span>had to pause trading some of the business</span></span></span></li>
                     <li><span><span><span>had to recruit temporary workers</span></span></span></li>
                     <li><span><span><span>unable to meet demands</span></span></span></li>
                     <li><span><span><span>other</span></span></span></li>
                     <li><span><span><span>not sure</span></span></span></li>
                     <li><span><span><span>business has not been affected</span></span></span></li>
                    </ul>

                    <p><span><span><strong>Figure 1:&nbsp; In Wave 87, 55.4% of businesses reported that the shortage of workers has resulted in employees working increased hours. The next most commonly reported impacts were that businesses were unable to meet demands (40.3%) and had to recruit temporary workers (21.7%).</strong></span></span></p>

                    <p><span><span>Estimated share of businesses by impact of worker shortage. Businesses not permanently stopped trading, with 10+ employees and a presence in Scotland. Wave 87 - 10 July to 23 July 2023.</span></span></p>

                    <p><img src="bics-wave-87---figure-1---worker-shortages-svg/{_document}/hippogallery:original" alt="A bar chart showing that 55.4% of businesses reported that the shortage of workers has resulted in employees working increased hours." /></p>

                    <p><span><span><span>Source: <a href="https://www.gov.scot/publications/bics-weighted-scotland-estimates-data-to-wave-87/documents/">BICS Weighted Scotland Estimates - Wave 87</a> from the Scottish Government</span></span></span></p>

                    <p><span><span><span><a href="https://www.gov.scot/publications/bics-weighted-scotland-estimates-data-to-wave-87/documents/">Download the data for this publication (.xlsx, 6.1MB):</a> for Figure 1 data see table ‘WorkerShortageAffected’.</span></span></span></p>
