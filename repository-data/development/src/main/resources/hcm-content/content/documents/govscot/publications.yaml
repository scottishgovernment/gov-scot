                  <p>Instead of long term funding certainty that was available during our EU membership, we now have an inadequate settlement within the United Kingdom. The announcement made by the UK Government on the 30th of October was for one year only. So however much I would like to deliver a multi annual settlement, we only have financial information for one financial year. And given the point I've just made about the uncertainty about the implications in our budget - that will constrain the ability of the Scottish Government to set out the multi annual certainty that everyone in the industry would like us to do, because we have no line of sight on any composition of our budget beyond the 31st of March 2026, at this particular stage.</p>
                  <p>In the spring, there will be a UK Spending Review, which will give us, we think, three years of funding certainty. And obviously, we will provide as much certainty as we possibly can do in ensuring that the industry knows where it stands. In addition to those points, the UK government must provide clarity on the future of financial support for the sector, after confirming in the autumn budget the agricultural funding will be baselined.</p>
                  <p>Because we are not yet certain what will be the direction of travel on agricultural support in England, and those challenges could have significant implications for Scotland. So as we take forward the work and the dialog in relation to the budget, I assure all of you, National Farmers Union especially, of the willingness of the Scottish Government to engage about the contents of the Scottish Government budget, and to ensure that the issues and the concerns of the agricultural sector are strongly reflected in the budget that we bring forward.</p>
                  <p>I also make clear to you that the £46 million that the government has utilised for short term purposes to ensure that we could deal with the effects of inflation in other areas of the budget, will be returned to this portfolio for use in the agriculture sector, and I give you that cast iron commitment on behalf of the Scottish Government.</p>
