                  jcr:primaryType: hippostd:html
                  hippostd:content: |-
                    <h3><span><span><span>Trading Status</span></span></span></h3>

                    <p><span><span><span>The BICS asks businesses about their trading status. Businesses were asked for their current trading status at the time of completion of the survey questionnaire (10 July to 23 July 2023 in Wave 87).</span></span></span></p>

                    <p><span><span><span>Overall, the share of businesses ‘currently trading’ was estimated at 99.4% in Wave 87. The share of businesses reporting that they were fully trading was estimated at 94.1%. Accommodation &amp; Food Services was the industry sector with the lowest share of “fully trading” businesses, estimated at 84.4%.</span></span></span></p>
