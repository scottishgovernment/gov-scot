                hippostdpubwf:creationDate: 2023-08-02T11:32:11.433+01:00
                hippostdpubwf:lastModificationDate: 2023-08-02T14:18:46.442+01:00
                hippostdpubwf:lastModifiedBy: Rachel.Dickie@gov.scot
                hippotranslation:id: 06ba71dd-7342-4e30-93c9-4e8f05cb8867
                hippotranslation:locale: document-type-locale
                /govscot:content:
                  jcr:primaryType: hippostd:html
                  hippostd:content: |-
                    <h3><span><span><span>Exporting and Importing Challenges</span></span></span></h3>

                    <p><span><span><span>The BICS asks businesses that are currently trading about how current conditions, including the end of the EU transition period, have impacted on their exporting and importing – the specific questions asked are shown below.</span></span></span></p>

                    <p><span><span><span>Question: How did your business's exporting compare with this calendar month last year?</span></span></span></p>

                    <ul>
                     <li><span><span><span>exported/imported more</span></span></span></li>
                     <li><span><span><span>exporting/importing stayed the same</span></span></span></li>
                     <li><span><span><span>exported/imported less</span></span></span></li>
                     <li><span><span><span>business was unable to export / import</span></span></span></li>
                     <li><span><span><span>not sure</span></span></span></li>
                    </ul>

                    <p><span><span><strong>Figure 3:&nbsp; Of businesses currently trading that have exported in the last 12 months, 23.8% reported exporting less in June 2023 compared to June 2022, and 16.2% reported exporting more. An estimated 9.4% of applicable businesses have imported less in June 2023 compared to June 2022, and 16.7% have imported more.</strong></span></span></p>

                    <p><span><span>Estimated share of businesses by exporting / importing change in June 2023 compared to June 2022. Businesses currently trading and exported / imported in last 12 months, with 10+ employees and a presence in Scotland. Wave 87.&nbsp;</span></span></p>

                    <p><span><span><img src="bics-wave-87---figure-3---exportimport-change-svg/{_document}/hippogallery:original" alt="A bar chart showing that of businesses currently trading that have exported/imported in the last 12 months, 23.8% reported exporting less in June 2023 compared to June 2022, and 16.2% reported exporting more." /></span></span></p>

                    <p><span><span><span>Source: <a href="https://www.gov.scot/publications/bics-weighted-scotland-estimates-data-to-wave-87/documents/">BICS Weighted Scotland Estimates - Wave 87</a> from the Scottish Government</span></span></span></p>

                    <p><span><span><span><a href="https://www.gov.scot/publications/bics-weighted-scotland-estimates-data-to-wave-87/documents/">Download the data for this publication (.xlsx, 6.1MB):</a> for Figure 3 data see tables ‘ExportingChangeOverYear’ and ‘ImportingChangeOverYear’.</span></span></span></p>

                    <p><span><span><span><span>Currently trading businesses that have exported or imported in the last 12 months, and reported on how exporting compared to the previous year, were asked if they had experienced an increase in exporting/importing challenges over the last month.</span></span></span></span></p>

                    <p><span><span><strong>Figure 4:&nbsp; The challenges that were most commonly reported to have increased in June 2023 were changes in transportation costs, changes in exchange rates and additional paperwork– this was the case for both exporting and importing. However, an estimated 53.2% of exporters and 46.3% of importers reported that they did not experience an increase in exporting/importing challenges in June 2023 compared with May 2023.</strong></span></span></p>

                    <p><span><span>Estimated share of businesses by increase in exporting / importing challenge in June 2023, compared with May 2023. Businesses currently trading and exported / imported in last 12 months, with 10+ employees and a presence in Scotland. Wave 87.</span></span></p>

                    <p><span><span><img src="bics-wave-87---figure-4---exportimport-challenges-svg/{_document}/hippogallery:original" alt="A bar chart showing the challenges that were most commonly reported to have increased in June 2023 were changes in transportation costs, changes in exchange rates and additional paperwork– this was the case for both exporting and importing." /></span></span></p>

                    <p><span><span><span>Source: <a href="https://www.gov.scot/publications/bics-weighted-scotland-estimates-data-to-wave-87/documents/">BICS Weighted Scotland Estimates - Wave 87</a> from the Scottish Government</span></span></span></p>

                    <p><span><span><span><a href="https://www.gov.scot/publications/bics-weighted-scotland-estimates-data-to-wave-87/documents/">Download the data for this publication (.xlsx, 6.1MB):</a> for Figure 4 data see tables ‘ExportChallengeIncrease’ and ‘ImportChallengeIncrease’.</span></span></span></p>

                    <p><span><span><span><span>Businesses that reported challenges to exporting/importing were asked about the main cause of these exporting/importing challenges.</span></span></span></span></p>

                    <p><span><span><strong>Figure 5:&nbsp; In Wave 87, 37.2% of applicable exporters reported that the end of the EU transition period was the main cause of their exporting challenges.&nbsp; This was also the most frequently reported cause of importing challenges (56.3%). The end of the EU transition period combined with the COVID-19 pandemic was reported as the main cause of challenges for a further 21.1% of exporters and 19.1% of importers.&nbsp; </strong></span></span></p>

                    <p><span><span>Estimated share of businesses by main cause of exporting / importing challenges. Businesses currently trading and exported / imported in last 12 months and experienced challenges, with 10+ employees and a presence in Scotland. Wave 87.</span></span></p>

                    <p><img src="bics-wave-87---figure-5---exportimport-challenge-cause-svg/{_document}/hippogallery:original" alt="A bar chart showing that in Wave 87, the end of the EU transition period was the main cause of both exporting and importing challenges" /></p>

                    <p><span><span><span>Source: <a href="https://www.gov.scot/publications/bics-weighted-scotland-estimates-data-to-wave-87/documents/">BICS Weighted Scotland Estimates - Wave 87</a> from the Scottish Government </span></span></span></p>

                    <p><span><span><span><a href="https://www.gov.scot/publications/bics-weighted-scotland-estimates-data-to-wave-87/documents/">Download the data for this publication (.xlsx, 6.1MB):</a> for Figure 5 data see tables ‘ExportingChallengeYMainCause’ and ‘ImportingChallengeYMainCause’.</span></span></span></p>
