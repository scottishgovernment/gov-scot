              hippostd:tags: [First Minister, Farming and rural]
              hippostdpubwf:createdBy: system
              hippostdpubwf:creationDate: 2024-11-13T15:50:08.516Z
              hippostdpubwf:lastModificationDate: 2024-11-14T10:10:10.666Z
              hippostdpubwf:lastModifiedBy: system
              hippotranslation:id: b74dd6ef-79cc-4b96-933d-017f39f8f7b7
