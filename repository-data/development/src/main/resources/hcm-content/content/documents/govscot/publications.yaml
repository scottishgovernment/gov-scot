                  <p>There are, of course, some specific decisions that we can take in Scotland, the 2024 payment strategy is on track with basic payments and greening payments, having started in September as planned. Over 16,000 businesses have received over 377 million pounds to date, and we are providing as much certainty and confidence as we can, and the Scottish Government will certainly be focused on delivering the four priorities that I set out of eradicating child poverty, growing the economy, protecting the planet and supporting our public services.</p>
