          govscot:summary: Workforce and community asked for views.
          govscot:title: Grangemouth's just transition
          govscot:updatedDate: 2024-11-08T12:05:17.024Z
          hippo:availability: []
          hippo:name: Grangemouth's just transition
          hippostd:retainable: false
          hippostd:state: draft
          hippostd:tags: [Communities and Third Sector, Environment and climate change]
          hippostdpubwf:createdBy: system
          hippostdpubwf:creationDate: 2024-11-13T15:24:02.173Z
          hippostdpubwf:lastModificationDate: 2024-11-15T10:30:27.296Z
          hippostdpubwf:lastModifiedBy: system
          hippotranslation:id: 7d2cd0da-034a-4cbc-8a6b-b653fa9a9152
          hippotranslation:locale: document-type-locale
          /govscot:content:
            jcr:primaryType: hippostd:html
            hippostd:content: |-
              <p>Grangemouth’s industrial workforce and community are being asked to contribute their views on the future of the area.</p>
              <p>A draft plan has been published today as part of work to support a just transition to net zero and support the growth of the area towards a decarbonised economy.</p>
              <p>The regional just transition plan is the first of its kind. It sets out the Scottish Government’s vision for the future of the Grangemouth industrial cluster and how the local community could benefit as a result.</p>
              <p>By successfully decarbonising, Grangemouth&nbsp;can become a global leader in sustainable manufacturing and production, attracting investment and supporting both the existing and future workforce, and the community, long into the future.&nbsp;</p>
              <p>The Scottish Government has worked in partnership with the Grangemouth Future Industry Board to develop the Grangemouth Industrial Just Transition Plan which supports industrial decarbonisation, low-carbon manufacturing, net zero community wealth building and reskilling and developing the local workforce. Proposed actions include: &nbsp;</p>
              <ul>
              <li>developing an industry-led technical and commercial investment strategy&nbsp;which includes a decarbonisation pathway to secure investment for scale up</li>
              <li>creating a Grangemouth Industrial Skills offer to help tailor training needs for the existing and future workforce</li>
              <li>improving the co-ordination of initiatives across the Forth Valley to ensure targeted interventions match needs</li>
              <li>funding a recognised Community Engagement and Participation Manager as a first step in supporting the community to play a role in decision making&nbsp;</li>
              </ul>
              <ul>
              <li>establishing a Grangemouth Regulatory Hub to support a just transition&nbsp;and understand how regulation can unlock industrial decarbonisation</li>
              </ul>
              <p>Acting Minister for Climate Action Alasdair Allan said: &nbsp;</p>
              <p>“Grangemouth has long played a vital role as Scotland’s leading industrial cluster and it is right that the area continues to help lead the way in our journey to net zero by 2045.</p>
              <p>“Our first regional Just Transition plan published today sets out our approach to support the growth of a decarbonised economy that puts local communities at its heart. It makes clear our vision for the future and gives specific actions across a number of areas to help achieve a just transition for Grangemouth.</p>
              <p>“The plan complements our ongoing activity focused around Grangemouth, including our support package in response to the proposed closure of the refinery and the work we are doing to explore low carbon transition opportunities for the refinery workforce. &nbsp;We are working hard to secure a sustainable, long-term future for the wider industrial cluster and its skilled workforce, and this plan will be vital in helping us to deliver this.</p>
              <p>“The consultation is an opportunity to help shape the development of the plan, and Grangemouth’s future. I encourage all who have a vested interest to participate.”</p>
              <p>CVS Falkirk and District Chief Executive Officer, Victoria McRae said:</p>
              <p>“The voice of local communities must be heard in relation to the plans for a Just Transition for Grangemouth. As the Third Sector Interface for the local area, CVS Falkirk and District are pleased to be able to take forward, support and facilitate these important conversations. We look forward to hearing a range of views and we have opened a Hub in Grangemouth’s Town Centre to provide a base for this discussion and engagement.”</p>
              <p>Syngenta Head of Corporate Affairs UK, Luke Gibbs said:</p>
              <p>“Syngenta is a large scale fine chemical manufacturer anchoring the Grangemouth Chemical Cluster.&nbsp; We believe that the Grangemouth Just Transition Plan is an important part of achieving a sustainable future across the range of activities that together form the wider Grangemouth industrial area - fine chemicals, petrochemicals, pharmaceuticals, and biotechnology. As such, this consultation provides a key opportunity for companies in Grangemouth to input their views and highlight needs, and collectively achieve a sustainable, enabling, investable, and viable future for all.”</p>
              <p><strong>Background </strong>&nbsp;</p>
              <p><a href="https://www.gov.scot/publications/grangemouth-industrial-transition-plan-supporting-fair-transition-scotlands-core-manufacturing-cluster-draft-consultation/">Grangemouth Industrial Just Transition Plan - Supporting a fair transition for Scotland's core manufacturing cluster - Draft for Consultation</a></p>
              <p>Following the announcement of Petroineos’ decision to close refinery in September 2024,&nbsp;The Scottish and UK Governments announced a&nbsp;<a href="https://www.gov.scot/news/joint-plan-to-secure-industrial-future-of-grangemouth/">joint plan to secure industrial future of Grangemouth.</a>&nbsp;</p>
