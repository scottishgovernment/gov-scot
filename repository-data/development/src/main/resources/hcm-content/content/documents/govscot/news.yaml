        /grangemouths-just-transition[1]:
          jcr:primaryType: govscot:News
          jcr:mixinTypes: ['hippo:named', 'mix:referenceable']
          jcr:uuid: 8733eedb-02cf-43ae-ad2b-8f5b86199d21
