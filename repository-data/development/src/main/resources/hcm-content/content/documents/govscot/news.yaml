          hippostd:tags: [Farming and rural, Energy, Environment and climate change]
          hippostdpubwf:createdBy: system
          hippostdpubwf:creationDate: 2024-06-07T08:50:48.434+01:00
          hippostdpubwf:lastModificationDate: 2024-06-07T08:50:49.590+01:00
