              <p>CVS Falkirk and District Chief Executive Officer, Victoria McRae said:</p>
              <p>“The voice of local communities must be heard in relation to the plans for a Just Transition for Grangemouth. As the Third Sector Interface for the local area, CVS Falkirk and District are pleased to be able to take forward, support and facilitate these important conversations. We look forward to hearing a range of views and we have opened a Hub in Grangemouth’s Town Centre to provide a base for this discussion and engagement.”</p>
              <p>Syngenta Head of Corporate Affairs UK, Luke Gibbs said:</p>
              <p>“Syngenta is a large scale fine chemical manufacturer anchoring the Grangemouth Chemical Cluster.&nbsp; We believe that the Grangemouth Just Transition Plan is an important part of achieving a sustainable future across the range of activities that together form the wider Grangemouth industrial area - fine chemicals, petrochemicals, pharmaceuticals, and biotechnology. As such, this consultation provides a key opportunity for companies in Grangemouth to input their views and highlight needs, and collectively achieve a sustainable, enabling, investable, and viable future for all.”</p>
              <p><strong>Background </strong>&nbsp;</p>
              <p><a href="https://www.gov.scot/publications/grangemouth-industrial-transition-plan-supporting-fair-transition-scotlands-core-manufacturing-cluster-draft-consultation/">Grangemouth Industrial Just Transition Plan - Supporting a fair transition for Scotland's core manufacturing cluster - Draft for Consultation</a></p>
              <p>Following the announcement of Petroineos’ decision to close refinery in September 2024,&nbsp;The Scottish and UK Governments announced a&nbsp;<a href="https://www.gov.scot/news/joint-plan-to-secure-industrial-future-of-grangemouth/">joint plan to secure industrial future of Grangemouth.</a>&nbsp;</p>
