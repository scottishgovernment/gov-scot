          hippo:name: Improving funeral standards
          hippostd:retainable: false
          hippostd:state: draft
          hippostd:tags: [Health and social care]
          hippostdpubwf:createdBy: system
          hippostdpubwf:creationDate: 2024-11-15T10:31:21.116Z
          hippostdpubwf:lastModificationDate: 2024-11-15T10:31:21.304Z
          hippostdpubwf:lastModifiedBy: system
          hippotranslation:id: 0623c751-080c-49e8-916b-ba20e37ba423
          hippotranslation:locale: document-type-locale
          /govscot:content:
            jcr:primaryType: hippostd:html
            hippostd:content: |-
              <p>Inspections and other measures will promote the highest standards of care and increase public confidence in the funeral sector under draft regulations laid in the Scottish Parliament.</p>
              <p>The Burial and Cremation (Inspection) (Scotland) Regulations 2025, if approved, will ensure minimum standards are maintained to safeguard the dignity of the deceased and promote compassionate and professional care for the bereaved.</p>
              <p>Inspectors will support any non-compliant business to make the changes needed but can issue enforcement notices with reasonable deadlines for action if necessary.</p>
              <p>Public Health Minister Jenni Minto said:</p>
              <p>“Bereavement can be emotionally overwhelming and being able to engage with the practical issues and funeral arrangements can be very difficult. It is, however, something everyone is likely to experience at some stage in their life, whether it's the death of a family member, a loved one, or a friend.</p>
              <p>“The vast majority of funeral directors and the wider industry provide dignified and professional services, and these reforms will benefit the sector by ensuring it is not unfairly impacted by the failings of a few.</p>
              <p>“These reforms have received widespread support within the industry and we will appoint additional inspectors to work with the sector to ensure best practice. Publishing inspection reports will lead to greater transparency and can help improve standards.</p>
              <p>“Having confidence in the care and dignity given to our loved ones, along with the compassionate and professional treatment of those bereaved, can go some way to alleviating the sorrow of bereavement.”</p>
              <p><strong>Background</strong></p>
              <p>The Health, Social Care and Sport Committee is expected to consider the draft Burial and Cremation (Inspection) (Scotland) Regulations 2025.</p>
              <p>Cremation authorities have been inspected since 2019 when the Cremation (Scotland) Regulations came into force. Inspections of funeral directors and burial authorities will become statutory from 1 March 2025 - the same date the&nbsp;Funeral Director Code of Practice and new burial regulations come into force.</p>
              <p>Separate regulations also laid on Thursday 14 November 2024 cover management of burial grounds, the creation of statutory burial application forms and updated registers of burial.</p>
          /govscot:topics:
            jcr:primaryType: hippo:mirror
            hippo:docbase: e4b2db4c-fd8a-4b54-a44b-56bf75a3e3ad
