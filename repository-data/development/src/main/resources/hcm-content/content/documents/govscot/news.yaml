          /govscot:content:
            jcr:primaryType: hippostd:html
            hippostd:content: |-
              <p>Proposals to simplify crofting regulation, encourage more use of common grazings and a range of other changes have received high levels of support in a recent consultation.</p>
              <p>The Scottish Government has published an independent analysis of the responses to the consultation on proposals for Crofting Law Reform, together with those responses where consent to publish was given.</p>
              <p>The consultation covered potential legislative changes to:</p>
              <ul>
              <li>support entry to crofting</li>
              <li>to clarify the community aspect of crofting law</li>
              <li>to promote use of common grazings, including for environmental purposes</li>
              <li>to strengthen adherence to crofters’ duties</li>
              <li>to modify the Crofting Commission’s regulatory roles and powers</li>
              <li>to make simplifications and corrections to current legislation</li>
              </ul>
              <p>More than 160 responses were received during the three-month consultation, with a further 257 people attending 15 events across crofting counties in July and August, to debate the key proposals.</p>
              <p>Minister for Agriculture Jim Fairlie said:</p>
              <p>“Most of the Government’s proposals were well supported by the consultation responses, though I recognise that some proposals received less strong backing.&nbsp; We will give full consideration to all the responses and will discuss key issues further with the Crofting Bill Group.</p>
              <p>“I am grateful to everyone who took time to share their views and look forward to continuing to work with crofting communities to ensure that the sector is supported and can attract a new generation.”</p>
              <p><strong>Background</strong></p>
              <p><a href="https://www.gov.scot/publications/crofting-consultation-2024-proposals-crofting-law-reform-analysis-responses/">Crofting Consultation 2024: Proposals for Crofting Law Reform – Analysis of Responses - gov.scot (www.gov.scot)</a></p>
              <p>The Crofting Bill Group is made up of a full range of stakeholders in crofting and crofting law.&nbsp; It was re-established in 2022 to advise the Scottish Government on priorities and options for Crofting Law Reform.</p>
              <p>Consultation events were held at:</p>
              <ul>
              <li>3 July - Inverness</li>
              <li>4 July - Thurso</li>
              <li>9 July - Ullapool</li>
              <li>11 July - Kinlochbervie</li>
              <li>17 July - Skye</li>
              <li>18 July - Lairg</li>
              <li>22 July - Yell</li>
              <li>23 July - Lerwick</li>
              <li>29 July - Spean Bridge</li>
              <li>30 July - Oban</li>
              <li>31 July - Tiree</li>
              <li>12 August - Stornoway</li>
              <li>13 August - Harris</li>
              <li>14 August - Benbecula</li>
              <li>15 August - Castlebay</li>
              </ul>
