        /improving-broadband-speeds[1]:
          jcr:primaryType: govscot:News
          jcr:mixinTypes: ['hippo:named', 'mix:referenceable']
          jcr:uuid: b5d390f2-4805-4a27-9d0e-b563f2e3d289
          govscot:contentitemlanguage: en
          govscot:externalId: 672c8ec2332656062028b3b0
          govscot:metaDescription: Water pipeline innovation for Orkney island residents.
          govscot:policyTags: [5808b67565a26906cc73e658]
          govscot:prglooslug: improving-broadband-speeds
          govscot:publicationDate: 2024-11-07T10:00:00Z
          govscot:reportingTags: []
          govscot:seoTitle: Improving broadband speeds
          govscot:slug: improving-broadband-speeds
          govscot:summary: Water pipeline innovation for Orkney island residents.
          govscot:title: Improving broadband speeds
          govscot:updatedDate: 2024-11-08T12:06:09.579Z
          hippo:availability: []
          hippo:name: Improving broadband speeds
          hippostd:retainable: false
          hippostd:state: draft
          hippostd:tags: [Communities and Third Sector, 'Business, industry and innovation',
            Economy]
          hippostdpubwf:createdBy: system
          hippostdpubwf:creationDate: 2024-11-13T15:21:12.428Z
          hippostdpubwf:lastModificationDate: 2024-11-15T10:31:17.447Z
          hippostdpubwf:lastModifiedBy: system
          hippotranslation:id: 31578a6d-a0be-4f51-9ffd-555016658224
          hippotranslation:locale: document-type-locale
          /govscot:content:
            jcr:primaryType: hippostd:html
            hippostd:content: |-
              <p>Drinking water pipes are delivering faster and more reliable broadband for the first time in the UK.</p>
              <p>Nearly every business and resident in Papa Westray, Orkney, can now receive speeds comparable to less rural areas of Scotland through the Reaching 100% (R100) programme.</p>
              <p>Contractor CloudNet used the community-owned water authority’s existing infrastructure, with Scottish Government funding, as a more efficient and less disruptive alternative to conventional cable laying methods.&nbsp;</p>
              <p>The fibre cable is delivered through a second pipe housed within the drinking water network. Papa Westray became the first to use this approach successfully because the water system is owned by the community, streamlining the process of gaining permissions and causing less disruption to the island’s roads.</p>
              <p>The new broadband network – which allows CloudNet to offer a superfast service – enables, for example, remote monitoring of livestock via CCTV&nbsp;and&nbsp;home healthcare check-ups via video call. It also supports visitor accommodation booking systems and tourism facilities on the island of 90 residents.</p>
              <p>Business Minister Richard Lochhead said:</p>
              <p>“This&nbsp;ingenious approach represents a less disruptive way of delivering faster&nbsp;connectivity to all on Papa Westray. Scotland is famous the world over for its innovation. We are working with rural communities in the most imaginative ways possible to bring faster broadband to some of the hardest to reach parts of the country.</p>
              <p>“This project showcases engineering creativity at its best and makes it easier for residents to do business and access essential services such as health and education.</p>
              <p>“This will also help attract people to live and work on Papa Westray. Under the £600 million R100 programme, the Scottish Government is helping deliver a fair, green and growing economy for all our regions.”</p>
              <p>Remote sensors placed in the water&nbsp;pipe provide a hi-tech way to monitor the island's water quality.</p>
              <p>Papa Westray Water Board supply engineer Ian Cursiter said:</p>
              <p>“Without this high speed connectivity, I wouldn't be able to remotely monitor my farm or the water network for the island.&nbsp;</p>
              <p>“The real benefit in monitoring the water network for levels of usage, pressure and so on, is providing a much more efficient water system, which will ultimately be more environmentally friendly and cost effective to islanders.&nbsp;</p>
              <p>“I’ve lived on Papa Westray my whole life and I'm delighted to see connectivity that allows the islanders to access the same facilities as those on the mainland.”&nbsp;</p>
              <p>CloudNet Managing Director Greg Whitton said:</p>
              <p>“CloudNet are proud to have delivered this Scottish Broadband Voucher Scheme project to the most remote island in Orkney – Papa Westray – the first successful commercial project of its kind in the UK.&nbsp;</p>
              <p>“Due to the island topography, we used the water network to deliver fibre to the premises. This helped minimise excavations and excessive construction costs on the project to meet the programme needs.”</p>
              <p><strong>Background</strong></p>
              <p>The R100 Scottish Broadband Voucher Scheme provided a voucher worth up to £5,000&nbsp;to help homes and businesses that were not in coverage plans of either the Reaching 100% contracts or planned commercial investment to obtain superfast broadband speeds where providers may not ordinarily go.</p>
              <p>Contractor CloudNet installed connections using a radio signal from the neighbouring island of Westray, which is then distributed to premises using fibre cabling.</p>
