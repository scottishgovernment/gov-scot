          hippotranslation:id: a95f1aea-38ec-4527-a38d-fe06f7103a38
          hippotranslation:locale: document-type-locale
          /govscot:content:
            jcr:primaryType: hippostd:html
            hippostd:content: |-
              <p>More than 10,000 hectares of damaged peatland has been restored in Scotland over the last year, reducing harmful emissions and accelerating progress to net zero.</p>
              <p>Ahead of World Peatlands Day on 2 June, the average rate of peatland restoration has more than doubled in the last two years and, thanks to more than 100 projects across the country, 2023-24 saw 10,360 hectares restored – the highest amount achieved in a single year.</p>
              <p>Peatlands cover nearly two million hectares of Scotland – with nearly three-quarters of these degraded – and account for two-thirds of the UK’s peatland.</p>
              <p>The Scottish Government has pledged £250 million to restore damaged peatlands, which release harmful greenhouse gases into the atmosphere, accounting for around 15% of Scotland’s emissions.</p>
              <p>Agriculture Minister Jim Fairlie said:</p>
              <p>“Restoring degraded peatland is one of the most cost-effective ways we can reduce carbon emissions and fight climate change. There are many benefits, such as reducing flooding risks, improving water quality and improving local biodiversity.</p>
              <p>“Increasing private investment in peatland restoration and maximising the community benefits from these projects is crucial. By increasing the pace and scale of peatland restoration we can restore our natural environment and tackle climate change more effectively and I am very pleased to mark this achievement ahead of World Peatlands Day.</p>
              <p>“I want to thank everyone across the Peatland ACTION partnership for all their hard work and commitment this year on achieving this significant milestone.”</p>
              <p>NatureScot Chair, Professor Colin Galbraith said:</p>
              <p>“As key partners in the Scottish Government’s Peatland ACTION partnership, NatureScot is accelerating the vital work needed to reach the ambitious target of 250,000 hectares of peatland being restored by 2030.</p>
              <p>“Putting Scotland’s degraded peatlands on the road to recovery makes a vitally important contribution to reducing greenhouse gas as well as providing broader benefits for biodiversity and water management.</p>
              <p>“Collectively, these reduce flood and fire risk and increase community resilience to the climate emergency.”</p>
              <p><strong>Background</strong></p>
              <p><a href="https://www.nature.scot/climate-change/nature-based-solutions/peatland-action/peatland-action-data-research-and-monitoring/peatland-action-data-mapping-portal">Peatland ACTION - Data mapping portal | NatureScot</a></p>
              <p>The Scottish Government funds five direct delivery partners to carry out peatland restoration projects through the Peatland ACTION Partnership - NatureScot, Forestry and Land Scotland, Cairngorms National Park Authority, Loch Lomond and Trossachs National Park Authority and Scottish Water. More information can be found here: <a href="https://www.nature.scot/climate-change/nature-based-solutions/peatland-action">Peatland ACTION</a></p>
              <p>Healthy peatlands have a central role in mitigating and adapting to the linked climate and nature emergencies.&nbsp; In good condition, peatlands provide multiple co-benefits: capturing and storing carbon, supporting nature, reducing flood risk, improving water quality and providing places that can support physical and mental wellbeing.</p>
              <p>Peatlands can be restored in various ways, such as re-wetting the land by installing dams to block drains, smoothing ploughed ridges and furrows, and removing trees and reducing grazing intensity.</p>
              <p><a href="https://scotlandsnature.wordpress.com/2024/05/31/world-peatlands-day-reasons-to-celebrate/">Scotland’s Nature blog - World Peatlands Day – reasons to&nbsp;celebrate!</a></p>
