        /supporting-public-services[1]:
          jcr:primaryType: govscot:News
          jcr:mixinTypes: ['hippo:named', 'mix:referenceable']
          jcr:uuid: 1121abc2-a958-4581-85fb-df949315b75a
          govscot:contentitemlanguage: en
          govscot:externalId: 665865c8cf129bb7a455f1b5
          govscot:metaDescription: Public Sector Pay Policy published.
          govscot:policyTags: [5a2a6642b637f10e84ce8b17, 5b4734ea39e4ad212cc5d723,
