              <p>Healthy peatlands have a central role in mitigating and adapting to the linked climate and nature emergencies.&nbsp; In good condition, peatlands provide multiple co-benefits: capturing and storing carbon, supporting nature, reducing flood risk, improving water quality and providing places that can support physical and mental wellbeing.</p>
              <p>Peatlands can be restored in various ways, such as re-wetting the land by installing dams to block drains, smoothing ploughed ridges and furrows, and removing trees and reducing grazing intensity.</p>
