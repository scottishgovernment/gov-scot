          govscot:seoTitle: Social Security Scotland paid £1.9 billion in support
            to people across Scotland in 2023-2024
          govscot:slug: social-security-scotland-paid-1-9-billion-in-support-to-people-across-scotland-in-2023-2024
          govscot:summary: More than 329,000 children receive vital support from Scottish
            Child Payment  
          govscot:title: Social Security Scotland paid £1.9 billion in support to
            people across Scotland in 2023-2024
          govscot:updatedDate: 2024-11-13T14:46:59.146Z
          hippo:availability: [preview]
          hippo:name: Social Security Scotland paid £1.9 billion in support to people
            across Scotland in 2023-2024
          hippostd:retainable: false
          hippostd:state: unpublished
          hippostd:tags: [Public Sector, Cost of living crisis, Scottish Budget, Equality
              and Rights]
          hippostdpubwf:createdBy: system
          hippostdpubwf:creationDate: 2024-11-13T15:30:06.451Z
          hippostdpubwf:lastModificationDate: 2024-11-13T15:30:06.676Z
