          govscot:title: Acting Net Zero Secretary at COP29
          govscot:updatedDate: 2024-11-07T13:49:25.019Z
          hippo:availability: []
          hippo:name: Acting Net Zero Secretary at COP29
          hippostd:retainable: false
          hippostd:state: draft
          hippostd:tags: [International, Environment and climate change]
          hippostdpubwf:createdBy: system
          hippostdpubwf:creationDate: 2024-11-13T15:23:27.020Z
          hippostdpubwf:lastModificationDate: 2024-11-14T10:10:03.587Z
          hippostdpubwf:lastModifiedBy: system
          hippotranslation:id: a3a2c927-e468-4c59-a629-7588f2fbdb78
          hippotranslation:locale: document-type-locale
          /govscot:content:
            jcr:primaryType: hippostd:html
            hippostd:content: |-
              <p>Acting Cabinet Secretary for Net Zero and Energy, Gillian Martin will attend the COP29 UN Climate Summit in Baku, to continue Scotland’s strong contribution to climate change discussions.</p>
              <p>Her schedule will include a number of roundtables and bilateral meetings with governments, international organisations, and groups to discuss ways to tackle the climate emergency.&nbsp;&nbsp;</p>
              <p>Ms Martin will also: &nbsp;</p>
              <ul>
              <li>set the strategic direction of Scotland’s two year term as Regions4 President</li>
              <li>deliver the opening remarks for a climate justice event focused on learning lessons from Scotland’s approach to addressing loss and damage, and the injustices at the heart of climate change</li>
              <li>participate in the Under2 General Assembly&nbsp;as European Co-Chair of the Under2 Coalition</li>
              <li>share Scotland’s expertise in the clean energy transition, and capitalise on our potential as a location for low carbon investment</li>
              </ul>
              <p>Ms Martin said: “Our country has a wealth of experience and expertise when it comes to the just transition to net-zero, which can help influence, inform, and shape the global climate debate.</p>
              <p>“Scotland was the first global north government to commit funding to address loss and damage – and that money is now supporting vulnerable communities who are at most risk of suffering the effects of climate change. We are committed to continuing that progress and contributing to the finance debate, to ensure it is in line with climate justice principles.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</p>
              <p>“I will be travelling to COP29 to represent the Scottish Government, share that practical experience and use our leadership positions in global sub-national organisations - such as the Under 2 Coalition and Regions4 - to help drive greater action across all levels of government in tackling the devastating impact of climate change.&nbsp;&nbsp;</p>
              <p>“Scotland’s commitment to ending our contribution to global emissions by 2045 at the latest is ambitious, but it is achievable. We know that challenges lie ahead and the only way we can truly meet the need and urgency of the task that lies ahead is by working together exchange ideas and agree shared actions.”&nbsp;</p>
