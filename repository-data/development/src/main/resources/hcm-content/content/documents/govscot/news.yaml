        /almost-a-third-of-adults-are-living-with-obesity-the-scottish-health-survey-shows[1]:
          jcr:primaryType: govscot:News
          jcr:mixinTypes: ['hippo:named', 'mix:referenceable']
          jcr:uuid: 62c69121-fa8d-43b2-90bb-f3f85b17a802
          govscot:contentitemlanguage: en
          govscot:externalId: 67333cb601692c02b218273e
          govscot:metaDescription: An accredited official statistics publication.
          govscot:policyTags: [5c8bcf12aeecf518d41c8ab3]
          govscot:prglooslug: almost-a-third-of-adults-are-living-with-obesity-the-scottish-health-survey-shows
