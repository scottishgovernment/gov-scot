        /improving-the-lives-of-people-with-diabetes[1]:
          jcr:primaryType: govscot:News
          jcr:mixinTypes: ['hippo:named', 'mix:referenceable']
          jcr:uuid: 4e29e872-0618-483d-915b-bac59cc62a9e
