        /acting-net-zero-secretary-at-cop29[1]:
          jcr:primaryType: govscot:News
          jcr:mixinTypes: ['hippo:named', 'mix:referenceable']
          jcr:uuid: 8969ce89-99a2-4961-abe2-4bf6dd028dbd
          govscot:contentitemlanguage: en
          govscot:externalId: 672c9b6f332656062028b5cc
          govscot:metaDescription: Scotland to continue influencing on global climate
            action
          govscot:policyTags: [598aff14b85dc13f6c1f7fc2, 598aff14b85dc13f6c1f7fc3,
