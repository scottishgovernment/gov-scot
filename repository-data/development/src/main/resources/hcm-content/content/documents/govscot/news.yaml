        hippo:name: Creating future business leaders
        hippo:versionHistory: c53a5cd2-fdf9-4cf7-a1b3-42f8038cb3ef
        /creating-future-business-leaders[1]:
          jcr:primaryType: govscot:News
          jcr:mixinTypes: ['hippo:named', 'mix:referenceable']
          jcr:uuid: dd977dfa-0f94-4133-a443-774409acdbac
          govscot:contentitemlanguage: en
          govscot:externalId: 6735c1e701692c02b218478f
          govscot:metaDescription: Funding to expand entrepreneurship in Scotland.
          govscot:policyTags: []
          govscot:prglooslug: creating-future-business-leaders
          govscot:publicationDate: 2024-11-15T00:01:00Z
          govscot:reportingTags: []
          govscot:seoTitle: Creating future business leaders
          govscot:slug: creating-future-business-leaders
          govscot:summary: Funding to expand entrepreneurship in Scotland.
          govscot:title: Creating future business leaders
          govscot:updatedDate: 2024-11-15T17:45:49.401Z
          hippo:availability: []
          hippo:name: Creating future business leaders
          hippostd:retainable: false
          hippostd:state: draft
          hippostd:tags: [Economy]
          hippostdpubwf:createdBy: system
          hippostdpubwf:creationDate: 2024-11-15T10:31:20.576Z
          hippostdpubwf:lastModificationDate: 2024-11-15T17:50:00.843Z
          hippostdpubwf:lastModifiedBy: system
          hippotranslation:id: 05dd45fa-ac3b-4558-a482-42993ee3276c
          hippotranslation:locale: document-type-locale
          /govscot:content:
            jcr:primaryType: hippostd:html
            hippostd:content: |-
              <p>More than £1.9 million has been awarded to create the entrepreneurs of the future and to increase access to business careers.</p>
              <p>Pupils will have the opportunity to learn about business from primary one to the end of high school under a new initiative to boost entrepreneurship in Scotland. This follows more than £829,000 being awarded to seven education organisations.</p>
              <p>They include Gen+, which is designing lessons that set high school pupils real-world challenges by established entrepreneurs, focused on running aspects of a business, while the University of Strathclyde will provide activity packs that develop entrepreneurial skills in primary school children.</p>
              <p>Adults under-represented in business, including women and ethnic minorities, will benefit from £1.08 million awarded to 13 organisations through the Pathways Fund, helping turn their ideas and fledgling businesses into growing enterprises.</p>
              <p>Deputy First Minister Kate Forbes visited pupils at Braes High School in Falkirk to see some of the entrepreneurial projects they have been working on.</p>
              <p><strong>Ms Forbes said:&nbsp;</strong><strong>&nbsp;</strong></p>
              <p>“These projects mean that for the first time entrepreneurship will be embedded in Scotland’s classrooms, from P1 to S6. By mainstreaming the subject we aim to give every school leaver the skills, confidence and opportunity to set up their own business.</p>
              <p>“This is a continuation of the Scottish Government’s drive to create one of Europe’s leading start-up economies. Existing entrepreneurs are already being supported, including by our successful Techscaler programme. Now, through these two funds, we are developing the next generation.</p>
              <p>“I want young people and under-represented groups to be excited by the idea of going into business, to understand it’s something they can do.”</p>
              <p><strong>CEO of Gen+ Victoria Vardy said: </strong></p>
              <p>“At Gen+, we believe education should inspire young people to become adaptable, self-aware, and ready for the future.</p>
              <p>“ Our Industry Innovators programme connects classroom learning with insights from real-world business challenges, helping pupils understand and develop the core skills that lead to success across industries.“</p>
              <p>By learning directly from industry experts, students gain the confidence and practical skills to turn their ambitions into reality, empowering them to become Scotland’s future entrepreneurs and leaders of tomorrow.”</p>
              <p><strong>Background</strong>&nbsp;</p>
              <p>The Entrepreneurial Education Pathways Fund totals £829,346.&nbsp;&nbsp;</p>
              <p>Successful recipients of the Entrepreneurial Education Pathways Fund:&nbsp;&nbsp;</p>
              <ul>
              <li><strong>University of Strathclyde – Meet the RECCO Family (£80,994): </strong>To support the development of illustrated digital educational resources for the development of an entrepreneurial mindset in early primary school children (P1-3).&nbsp;</li>
              <li><strong>Daydream Believers – Dreamers and Doers (£146,200):</strong> To develop the Dreamers and Doers playlist creating three entrepreneurial challenges to promote creativity, innovation and problem-solving, integrated into the existing SCQF Creative Thinking qualification.&nbsp;&nbsp;</li>
              <li><strong>Gen+ – Industry Innovators (£79,834):</strong> To equip S1-S3 students with essential entrepreneurial skills, structured around specific skills and aligned with a real-world challenge set by local businesses.&nbsp;&nbsp;</li>
              <li><strong>Socialudo – Playing the Pathway to Entrepreneurship (£49,861):</strong> To co-produce and develop the game ‘Social Deal’ to provide a creative training package for use in both primary and secondary school level, introducing the different elements of business planning and business models.&nbsp;</li>
              <li><strong>Founders4Schools – Role Models for the entrepreneurs of tomorrow (£157,025):</strong> To scale their network of role models in Scotland, particularly in under-represented groups and develop their platform to ensure every educator has easy access to a network of entrepreneurs for S1-S6 pupils.&nbsp;</li>
              <li><strong>Powering Futures – Challenge for Education (£250,000):</strong> To deliver three programmes to enhance the understanding of the entrepreneurial mindset and the pathway to embed this work in future generations.&nbsp;&nbsp;</li>
              <li><strong>High School of Glasgow – START (£65,405):</strong> To develop a pilot for an interdisciplinary learning programme for Scottish schools. Teams of S6 pupils will be guided from problem solving to seed investment pitch and the pilot programme will take place in a select group of local authority schools in Glasgow and Edinburgh. &nbsp;</li>
              </ul>
              <p>The Pathways Fund totals £1.08 million.</p>
              <p>Successful recipients of the Pathways Fund:</p>
              <ul>
              <li><strong>Business Women Scotland – Programme for Growth (£40,000)</strong>: Support for women in business, addressing the challenges they face in achieving significant growth through a comprehensive 2-day seminar and personalised guidance from</li>
              <li><strong>GrowBiz - Developing Women's Rural Enterprises (£106,505): </strong>Supporting women and other underrepresented groups across rural and island areas of Scotland who are either considering self-employment, seeking to grow a venture, or considering ways of becoming a greener business.</li>
              <li><strong>Orkney Island Council - Entrepreneurial Islands project (£65,350): </strong>A coaching and mentoring programme for the Orkney islands to access tailored support, building enthusiasm and encouraging new business start-ups, while assisting business funding applications.</li>
              <li><strong>Investing Women Ltd – AccelerateHER (£200,000): </strong>This project delivers educational programmes and networking opportunities across Scotland to tackle the gender gap in accessing investment, by providing female business founders with relevant knowledge, skillsets, connections and opportunities needed to grow and scale their businesses.</li>
              <li><strong>Rebel Business School (Enjoy Training Ltd) - How to Start &amp; Scale a Business for Female Founders (£49,970):</strong> Workshop programme will be delivered both virtually and in Glasgow to support women begin their journey.</li>
              <li><strong>Together Reaching Higher - Entrepreneurial Empowerment Pathways Hub (£52,590)</strong>: This will transform a temporary simple drop-in service into a permanent, sustainable resource Hub for ethnic minorities in Glasgow, focusing on women. This will support aspiring entrepreneurs with mentorship, training, and resources to develop their social enterprises.</li>
              <li><strong>Inspirent Ltd – Women Can Grow! Bootcamp (£129,200): </strong>Building on from the success of Women Can! in 2023/24 this programme will provide women with practical support to move their startup beyond the initial planning, or early stage, to implementation within Glasgow, North and South Lanarkshire.</li>
              <li><strong>Challenges Catalyst - Ready to RISE (Readiness &amp; Incubation for the Social Economy) (£96,974): </strong>This programme, delivered in suburban areas of the central belt and Tayside, is aimed at mothers and others whose work prospects have been impacted by a career break because of caring responsibilities, migration, or health issues.</li>
              <li><strong>Edinburgh Chambers of Commerce - Women in Business: Entrepreneurial Growth Programme (£57,575)</strong>: A programme to empower female founders with established businesses to expand, grow, and attract investment through training, coaching, and opportunities to connect with fellow female entrepreneurs in the Edinburgh region.</li>
              <li><strong>PeoplePlus – Supporting Women in Enterprise (£74,037): </strong>Supporting women within marginalised communities in Glasgow through a 12-week programme where Business Advisers will provide tailored business advice, training, and networking opportunities.</li>
              <li><strong>Robert Gordon University - RGU Women in Business: Starting up (£55,292): </strong>A 7-week flexible online enterprise programme offering expert consultancy support, and networking opportunities based in Aberdeenshire, tailored to the needs of mothers and care-givers.</li>
              <li><strong>Business Gateway East Renfrewshire - Black, Asian and Minority Ethnic Business Accelerator For East Renfrewshire (£95,850): </strong>Seminars, workshops, events and direct 1-2-1 support to businesses within the Black and Asian Minority and Ethnic community in East Renfrewshire.</li>
              <li><strong>West Lothian Council - Women Entrepreneurs Growth Programme (£57,630): </strong>Workshops to support women in West Lothian from pre-start to pre-investment, providing networking and commercial pop-up shop opportunities.</li>
              </ul>
          /govscot:topics:
            jcr:primaryType: hippo:mirror
            hippo:docbase: 384e34ce-a038-4973-a0c3-99f573e269bc
