          hippo:name: Social Security Scotland paid £1.9 billion in support to people
            across Scotland in 2023-2024
          hippostd:retainable: false
          hippostd:state: draft
          hippostd:tags: [Public Sector, Cost of living crisis, Scottish Budget, Equality
              and Rights]
          hippostdpubwf:createdBy: system
          hippostdpubwf:creationDate: 2024-11-13T15:30:06.451Z
          hippostdpubwf:lastModificationDate: 2024-11-15T10:31:17.866Z
          hippostdpubwf:lastModifiedBy: system
          hippotranslation:id: cfb76a2a-3804-40c8-82b3-46f97d4ce072
          hippotranslation:locale: document-type-locale
          /govscot:content:
            jcr:primaryType: hippostd:html
            hippostd:content: |-
              <p>Social Security Scotland has published its Annual Report and Accounts, which shows that it made £1.9 billion in payments to people in Scotland from 1 April 2023 to 31 March 2024. The payments were made across 14 Scottish benefits, seven of which are not available anywhere else in the UK. </p>
              <p>This includes £942 million for Adult Disability Payment which now supports more than 300,000 disabled people in Scotland. Social Security Scotland also paid £463 million to help families on low incomes with their living costs through five family payments, which includes Scottish Child Payment, which was benefitting more than 329,000 children and young people by the end of March 2024.  &nbsp;</p>
              <p>Winter Heating Payment was paid to 400,000 people by February this year to help towards the cost of heating homes and Carer Support Payment which offers help to people who do so much for others began a phased rollout in the Western Isles, Dundee City and Perth and Kinross last year and is now available across Scotland.  Eligible people who get benefits include carers, disabled people and families, pensioners, young people starting jobs and people who need help paying for a funeral. &nbsp;</p>
              <p>The results of the organisation’s annual Client Survey have also been published, showing that 90% of respondents who received a payment from Social Security Scotland say their overall experience was ‘very good’ or ‘good’.   &nbsp;</p>
              <p>Among those who responded to the survey, 85% said their experience with staff was also ‘very good’ or ‘good’, 89% said they were treated with kindness while 85% of people surveyed felt they were listened to.   &nbsp;</p>
              <p>95% of people with experience of Scottish Child Payment rated their overall experience as ‘very good’ or ‘good’.&nbsp;</p>
              <p>In total, the combination of direct payments made by Social Security Scotland and those paid through Agency Agreements with the Department for Work and Pensions saw the Scottish Government invest over £5.2 billion in benefits across Scotland.   &nbsp;</p>
              <p><strong>Cabinet Secretary for Social Justice, Shirley-Anne Somerville, said: </strong>   &nbsp;</p>
              <p>“We are committed to tackling poverty and supporting people throughout Scotland. At a time when families are struggling with the ongoing cost-of-living crisis, we have been delivering 14 benefits, seven of which are only available in Scotland.   &nbsp;</p>
              <p>“Winter Heating Payment is a reliable annual payment to people on low incomes in Scotland, including pensioners receiving Pension Credit. We continue to offer vital support to families through our five family payments, including Scottish Child Payment which was helping to support more than 329,000 children and young people by the end of financial year 2023-24.”&nbsp;</p>
              <p>“We are focused on ensuring people get the money they are entitled to and that we deliver these payments while treating people with dignity, fairness and respect.”    &nbsp;</p>
              <p><strong>Social Security Scotland Chief Executive, David Wallace, said:</strong>  &nbsp;</p>
              <p>“While our service has continued to expand significantly, our clients remain at the heart of everything we do. &nbsp;</p>
              <p>“We have focused on delivering new payments to people across Scotland including Carer Support Payment, while ensuring we give our clients an improved experience. This year, we have reduced call waiting and processing times and made it easier for people to submit supporting information for disability benefit applications. &nbsp;</p>
              <p>“As the number of people we serve grows, I am delighted we have maintained high client satisfaction rates with our annual Client Survey showing 90% of people who received a payment from us saying their overall experience was ‘very good’ or ‘good’.” &nbsp;</p>
              <p><strong>Background</strong></p>
              <ul>
              <li><a href="https://www.socialsecurity.gov.scot/reporting/publications/annual-report-2023-2024">Social Security Scotland 2023-2024 Annual Report and Accounts</a></li>
              <li>The Annual Report and Accounts cover the period from 1 April 2023 to 31 March 2024    </li>
              <li>The results of the <a href="https://www.socialsecurity.gov.scot/reporting/publications/client-survey-2023-2024">Client Survey</a> for 2023-2024</li>
              <li><a href="https://www.socialsecurity.gov.scot/reporting/publications/measuring-our-charter-2023-2024">Charter Measurement Framework 2023-2024</a>, a framework which tracks how well the new social security system is delivering on its commitments.   &nbsp;</li>
              <li>Payments made in this last financial year were to clients receiving: Carer’s Allowance Supplement, Carer Support Payment, Best Start Grant Pregnancy and Baby Payment, Best Start Grant Early Learning payment, Best Start Grant School Age Payment, Best Start Foods, Funeral Support Payment, Young Carer Grant, Job Start Payment, Scottish Child Payment, Child Winter Heating Assistance, Adult Disability Payment, Child Disability Payment and Winter Heating Payment.    &nbsp;</li>
              <li><a href="https://www.socialsecurity.gov.scot/reporting/publications/scottish-child-payment-high-level-statistics-to-31-march-2024">Scottish Child Payment: high level statistics to 31 March 2024</a></li>
              <li><a href="https://www.socialsecurity.gov.scot/reporting/publications/adult-disability-payment-high-level-statistics-to-31-july-2024">Adult Disability Payment: high level statistics to 31 July 2024</a></li>
              <li><a href="https://www.gov.scot/news/keeping-100-000-children-out-of-poverty/" style="font-family: inherit; font-size: inherit; letter-spacing: 0.1px">Child poverty CIA modelling: Keeping 100,000 children out of poverty</a></li>
              </ul>
