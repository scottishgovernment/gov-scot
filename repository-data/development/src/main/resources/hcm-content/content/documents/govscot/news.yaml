          /govscot:content:
            jcr:primaryType: hippostd:html
            hippostd:content: |-
              <p>Wood-burning stoves, bioenergy and peat heating will now be permitted in new homes and buildings following a review of the New Build Heat Standard commissioned by ministers earlier this year.</p>
              <p>An amendment to regulations made today permits the installation of bioenergy and peat main heating systems - and any type of secondary heating systems - in new buildings from 1 January 2025, while maintaining the prohibition on mains gas and oil boilers as a main heating system.</p>
              <p>Alasdair Allan, Acting Minister for Climate Action said:</p>
              <p>“The New Build Heat Standard is crucial to help reduce emissions from new buildings, preventing the need for retrofit in the future and ensuring a cleaner and greener Scotland.</p>
              <p>“Heat from our homes and buildings makes up almost a fifth of Scotland’s carbon emissions so we must tackle the most polluting forms of domestic heating to reach net zero.</p>
              <p>“We have listened to concerns from rural and island communities about resilience in times of bad weather or power outages, as well as the wider use of bioenergy and peat for other reasons. These changes address these concerns whilst retaining the spirit of the original legislation, which aims to eradicate polluting gas and oil boilers from new homes and buildings.</p>
              <p>“I would like to thank all of those who submitted evidence and views, particularly those from rural and island communities – their input has been vital in delivering his positive outcome.”</p>
              <p>Luke Fraser, Vice Chair of the Scottish Islands Federation said:</p>
              <p>'The Scottish Islands Federation is delighted that the points raised by our members and others, as part of the review of the New Build Heat Standard, have been taken into account. We believe there is a need to help sustain and support the resilience of households in rural and island communities through the use of wood burning stoves and burning of peat, and the changes to the NBHS announced today have taken this on board.</p>
              <p>“While we are in support of the need for climate action, progress must be made in tandem with developing and enhancing the resilience and sustainability of our communities, not at their expense. This change is a positive step in that direction.'</p>
              <p>Background</p>
              <p><a href="https://www.gov.scot/publications/icia-new-build-heat-standard-amended-2024/pages/1/">Updated New Build Heat Standard regulations: ICIA - New Build Heat Standard (Amended) 2024 - gov.scot (www.gov.scot)</a></p>
              <p><a href="https://www.gov.scot/publications/new-build-heat-standard-factsheet/">New Build Heat Standard: factsheet - gov.scot (www.gov.scot)</a></p>
              <p>The Scottish Government consulted on proposals for the New Build Heat Standard in 2021 and again in 2022, and also carried out a series of impact assessments&nbsp;which have been updated as part of the review, as required.</p>
              <p>Under the original regulations, which came into force in April this year, wood burning stoves were only permitted in new homes and buildings for emergency heating.</p>
              <p>Ministers introduced a temporary direction in September 2024 which reverted the regulations to the pre-April 2024 situation in relation to bioenergy and peat systems in new homes only, pending the conclusion of this review. These interim provisions remain in place until 1 January.</p>
