          hippo:name: Call to scrap UK voter ID requirements
          hippostd:retainable: false
          hippostd:state: draft
          hippostd:tags: [Public Sector]
          hippostdpubwf:createdBy: system
          hippostdpubwf:creationDate: 2024-11-17T10:10:00.410Z
          hippostdpubwf:lastModificationDate: 2024-11-17T10:10:01.452Z
          hippostdpubwf:lastModifiedBy: system
          hippotranslation:id: 657a7d12-285c-427d-8cbb-0e5275d25f0d
          hippotranslation:locale: document-type-locale
          /govscot:content:
            jcr:primaryType: hippostd:html
            hippostd:content: |-
              <p>Requirements for voter identification brought in by the previous UK Government should be scrapped, the Minister for Parliamentary Business has said.</p>
              <p>Jamie Hepburn has highlighted evidence from the Electoral Commission that the new requirements kept potential voters away from the ballot box at the recent UK Parliamentary election, and fears misunderstanding around the need for ID could have a similar impact in Scotland.</p>
              <p>In a letter to Rushanara Ali MP, Parliamentary Under Secretary of State (Housing, Communities and Local Government), he asked for the UK Government to consider scrapping voter ID requirements.</p>
              <p><strong>Background</strong></p>
              <p><a href="https://www.gov.scot/publications/voter-id-letter-to-uk-government/">Letter to Parliamentary Under Secretary of State (Housing, Communities and Local Government)</a></p>
          /govscot:topics:
            jcr:primaryType: hippo:mirror
            hippo:docbase: 6d3396ca-e5d9-410b-a1a1-5d547d36a7e7
