          govscot:title: Driving progress on global climate financing
          govscot:updatedDate: 2024-11-13T09:43:44.711Z
          hippo:availability: []
          hippo:name: Driving progress on global climate financing
          hippostd:retainable: false
          hippostd:state: draft
          hippostd:tags: [International, Environment and climate change]
          hippostdpubwf:createdBy: system
          hippostdpubwf:creationDate: 2024-11-13T15:30:08.994Z
          hippostdpubwf:lastModificationDate: 2024-11-15T10:31:19.146Z
          hippostdpubwf:lastModifiedBy: system
          hippotranslation:id: 03f7b7cf-9aed-45e3-af60-3cc3b0dac402
          hippotranslation:locale: document-type-locale
          /govscot:content:
            jcr:primaryType: hippostd:html
            hippostd:content: |-
              <p>Communities which are most at risk from the impacts of climate change will benefit from Scottish Government funding which will support them to prepare for climate changes ahead.</p>
              <p>The Scottish Government will provide £40,000 to Regions4 to deliver a project focused on the emerging area of ‘just resilience’.</p>
              <p>The term broadly refers to actions which prepare countries and regions for the known impacts of climate change – whilst recognising that those least responsible for climate change are often most impacted by it.</p>
              <p>The project will help create a standardised definition of the term and identify examples of best practice – to help countries in global south access funding to prepare for the impacts of climate change, such as flooding, fire and disease. It will also assess bids from communities within Regions4 partner regions and match relevant projects with suitable funding.</p>
              <p>The Scottish Government will also provide £200,000 to help develop cholera vaccine testing in Malawi and Zambia. These countries have been experiencing a surge of cases brought about by the impacts of climate change. This funding builds on the Scottish Government’s existing partnerships with both countries, and will strengthen local capacity for vaccine testing, distribution and delivery.</p>
              <p>Acting Net Zero Secretary Gillian Martin said: "Climate justice is at the heart of COP29 - and the Scottish Government is working to ensure that it supports and champions the voice of communities from the global south.</p>
              <p>“Just Resilience has the potential to make a significant impact upon the lives of those most affected by climate change and this project represents a rare opportunity for the Scottish Government to lead on an emerging field of climate action in a way that is in line with our climate justice principles.</p>
              <p>“By supporting the development of a globally recognised definition of just resilience, as well as identifying examples of best practice – countries and regions will be able to better identify opportunities for funding and support.</p>
              <p>“Ensuring that everyone has access to safe and effective vaccines is also critical – as cases of diseases such as cholera become more prevalent as a direct consequence of climate change.</p>
              <p>“These two projects are the latest examples of our work as a good global citizen and further developing the resilience of countries in the global south against the impacts of climate change.”</p>
              <p>Speaking about the Just Resilience fund, Regions4 Secretary General, Natalia Uribe said:&nbsp; “Scotland’s contribution to the Just Resilience Project shows an invaluable commitment to advancing climate and biodiversity action that is both fair and inclusive. This support allows Regions4 to bring the concept of Just Resilience to life by capturing and sharing transformative actions from subnational governments in the Global South.</p>
              <p>“By establishing frameworks, sharing best practices, and fostering collaboration, we are building the capacity of local governments to implement resilient solutions that prioritize the needs of communities most vulnerable to climate impacts. Together, we are working to empower these communities, ensuring that they are equipped to face climate challenges and have a central role in protecting our shared future."</p>
              <p><strong>Background:</strong></p>
              <p>More information on vaccine testing: <a href="https://www.gov.scot/policies/international-development/global-health/">Global health - International development - gov.scot (www.gov.scot)</a></p>
