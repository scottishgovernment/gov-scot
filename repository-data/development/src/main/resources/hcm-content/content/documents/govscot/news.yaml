          hippostdpubwf:lastModificationDate: 2024-11-15T10:31:18.609Z
          hippostdpubwf:lastModifiedBy: system
          hippotranslation:id: ec3c32cf-1392-4424-a7b0-cde9c44a3170
          hippotranslation:locale: document-type-locale
          /govscot:content:
            jcr:primaryType: hippostd:html
            hippostd:content: |-
              <p>Actions to help planning authorities will increase the speed of approvals, deliver more new homes and grow the number of planners.</p>
              <p>A new Housing Planning Hub will increase the rate at which homes with planning permission are delivered, stimulating Scotland’s housing supply and supporting economic growth. Three times the number of current student bursaries will also be made available to encourage more future planners and address staff shortages.</p>
              <p>On average 29,000 homes have been given planning permission in Scotland every year [Competition and Markets Authority - <a href="https://www.gov.uk/cma-cases/housebuilding-market-study#final-report" target="_blank" rel="noopener" title="Housebuilding market study">Housebuilding market study</a>], more than the 25,000 industry experts are calling for. The Housing Planning Hub will tackle the reasons for delays, which include waits on decisions for major developments, lengthy negotiations of section 75 agreements, funding issues, or policy requirements to address issues such as flooding or biodiversity.</p>
              <p>Public Finance Minister Ivan McKee outlined the actions to Parliament today. He said:</p>
              <p>“Planning has not created the housing emergency, but it can help us to find solutions to the challenges we are facing.</p>
              <p>“The Scottish Government is focused on working with partner organisations to identify how our planning system can help to provide these solutions.</p>
              <p>“This decisive and properly targeted action, based on evidence, will provide more homes and better places for people to live in.”&nbsp;</p>
              <p><strong>Background</strong></p>
              <ul>
              <li>The Housing Planning Hub will be operational in early 2025. This will complement the Planning Hub for Hydrogen developments announced as part of the Programme for Government in September - <a href="https://www.gov.scot/news/boosting-scotlands-planning-system/" target="_blank" rel="noopener" title="News Release on Boosting Scotland's planning system">Boosting Scotland’s planning system</a></li>
              <li>The costs and staffing of the Housing Planning Hub will be met by the Scottish Government. The Hub will see officials working collaboratively with local authorities and industry partners where there is mutual agreement.</li>
              <li>The&nbsp;2025/26 bursaries will be available for post-graduate study at the Planning Schools in Heriot-Watt, Dundee or Glasgow Universities. Access to internships and industry placements will also be facilitated by the Royal Town Planning Institute (RTPI).</li>
              </ul>
          /govscot:topics[1]:
            jcr:primaryType: hippo:mirror
            hippo:docbase: 0071f7c5-e0fe-40e7-802b-73e04d83eec6
          /govscot:topics[2]:
            jcr:primaryType: hippo:mirror
            hippo:docbase: e4e9ddd2-2a9f-4222-8221-94e638689b0e
