              <p><strong>Drinking at hazardous or harmful levels continued to decrease, </strong>from 34% of adults in 2003 to 20% in 2023. &nbsp;The proportion of males that drank to hazardous or harmful levels was twice as high as for females (28% and 14% respectively).</p>
              <p><strong>Mental wellbeing and mental ill health returned to similar levels to those reported in 2021, following an increase in 2022.&nbsp; </strong>Average Warwick-Edinburgh Mental Wellbeing (WEMWBS) scores for adults increased to 48.9, up from 47.0 in 2022 and 48.6 in 2021.&nbsp; The proportion of adults with a GHQ-12 score of 4 or more (21%), indicative of a possible psychiatric disorder, returned to a similar level to 2021 (22%) following an increase to 27% in 2022.&nbsp;</p>
              <p>Other key findings show that in 2023:</p>
              <ul>
              <li>One in ten adults (10%) reported feeling <strong>lonely</strong> ‘most’ or ‘all of the time’, similar to the level reported in 2022 (11%). &nbsp;Adults aged 16-24 (19%) and those living in the most deprived areas (14%) were the most likely to report feeling like this in the past week.</li>
              <li>Adult prevalence of <strong>limiting long-term conditions</strong> was 38%, similar to 2022 (37%) and continuing the general upward trend.&nbsp;</li>
              <li>Prevalence of any <strong>CVD </strong>(excluding diabetes or high blood pressure) remained at 15% of adults.&nbsp;</li>
              <li>More than one in two adults (57%) reported having ever undertaken <strong>cardiopulmonary resuscitation (CPR) training </strong>and one in five adults (18%) had undertaken CPR training in the last two years.</li>
              <li>Fourteen per cent of adults reported being <strong>unpaid carers, </strong>similar to levels in recent years (14-16% since 2016<strong>)</strong>.</li>
              <li>Eight per cent of adults and 2% of children reported currently having <strong>long COVID </strong>(compared to 5% of adults and 1% of children in 2021).</li>
              <li>Two per cent of adults reported that they had long COVID and it limited their ability to carry out day-to-day activities ‘a lot.’</li>
              <li>The proportion of adults reporting <strong>difficulties when visiting the dentist</strong> (34%) has increased since 2019 (20%) and 2021 (23%), returning to a similar level to 2009 (35%).</li>
              <li>The proportion of adults meeting the recommended levels of <strong>physical activity</strong> (63%) was not significantly lower than in 2022 (65%) and remained within the overall range recorded between 2012 and 2022 (62-69%).</li>
              <li>Around one in seven (15%) adults were current <strong>smokers</strong>, the same proportion as in 2022.</li>
              <li>Fourteen per cent of adults reported <strong>drug use</strong> during the last 12 months. Prevalence was highest for those aged 16-34 (26%-27%)</li>
              </ul>
              <p><strong>Background</strong></p>
              <p>The Scottish Health Survey 2023 main report, including a summary of key results, is available on the <a href="https://www.gov.scot/collections/scottish-health-survey">Scottish Health Survey website</a>. &nbsp;</p>
              <p>Key trends for Scotland and indicators for NHS health boards and local authorities are available via the <a href="https://scotland.shinyapps.io/sg-scottish-health-survey/">Scottish Health Survey Dashboard</a>.</p>
              <p>Accredited Official Statistics are produced in accordance with&nbsp;<a href="https://www.statisticsauthority.gov.uk/code-of-practice/the-code/">the Code of Practice for Statistics</a>.</p>
              <p>The Warwick-Edinburgh Mental Wellbeing Scale (WEMWBS) measures mental wellbeing in the general population. Scores range from 14 to 70 with higher scores indicating greater wellbeing.</p>
              <p>The General Health Questionnaire 12 (GHQ-12) scores range from 0-12. Scores of 4 or more are indicative of a possible psychiatric disorder.</p>
