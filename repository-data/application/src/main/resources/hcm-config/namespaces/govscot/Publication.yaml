definitions:
  config:
    /hippo:namespaces/govscot/Publication:
      jcr:primaryType: hipposysedit:templatetype
      jcr:mixinTypes: ['editor:editable', 'mix:referenceable']
      jcr:uuid: 44105405-8a33-49e7-bfc1-981ff0330556
      /hipposysedit:nodetype:
        jcr:primaryType: hippo:handle
        jcr:mixinTypes: ['mix:referenceable']
        jcr:uuid: 3142aadc-f3ff-49e6-8d7f-6f97f8c4fb91
        /hipposysedit:nodetype:
          jcr:primaryType: hipposysedit:nodetype
          jcr:mixinTypes: ['mix:referenceable', 'hipposysedit:remodel']
          jcr:uuid: 02f7e81f-b2bd-497b-8e8b-7fcd1fe677ee
          hipposysedit:node: true
          hipposysedit:supertype: ['govscot:AttributableContent', 'hippostd:relaxed',
            'hippotranslation:translated']
          hipposysedit:uri: http://www.onehippo.org/govscot/nt/1.0
          /isbn:
            jcr:primaryType: hipposysedit:field
            hipposysedit:mandatory: false
            hipposysedit:multiple: false
            hipposysedit:ordered: false
            hipposysedit:path: govscot:isbn
            hipposysedit:primary: false
            hipposysedit:type: String
          /publicationDate:
            jcr:primaryType: hipposysedit:field
            hipposysedit:mandatory: false
            hipposysedit:multiple: false
            hipposysedit:ordered: false
            hipposysedit:path: govscot:publicationDate
            hipposysedit:primary: false
            hipposysedit:type: Date
            hipposysedit:validators: [required]
          /dynamicdropdown:
            jcr:primaryType: hipposysedit:field
            hipposysedit:mandatory: false
            hipposysedit:multiple: false
            hipposysedit:ordered: false
            hipposysedit:path: govscot:publicationType
            hipposysedit:primary: false
            hipposysedit:type: DynamicDropdown
            hipposysedit:validators: [required]
          /officialdate:
            jcr:primaryType: hipposysedit:field
            hipposysedit:mandatory: false
            hipposysedit:multiple: false
            hipposysedit:ordered: false
            hipposysedit:path: govscot:officialdate
            hipposysedit:primary: false
            hipposysedit:type: CalendarDate
          /html_:
            jcr:primaryType: hipposysedit:field
            hipposysedit:mandatory: false
            hipposysedit:multiple: false
            hipposysedit:ordered: false
            hipposysedit:path: govscot:contact
            hipposysedit:primary: false
            hipposysedit:type: hippostd:html
          /html:
            jcr:primaryType: hipposysedit:field
            hipposysedit:mandatory: false
            hipposysedit:multiple: false
            hipposysedit:ordered: false
            hipposysedit:path: govscot:epilogue
            hipposysedit:primary: false
            hipposysedit:type: hippostd:html
          /sme:
            jcr:primaryType: hipposysedit:field
            hipposysedit:mandatory: false
            hipposysedit:multiple: false
            hipposysedit:ordered: false
            hipposysedit:path: govscot:sme
            hipposysedit:primary: false
            hipposysedit:type: Text
          /slug:
            jcr:primaryType: hipposysedit:field
            hipposysedit:mandatory: false
            hipposysedit:multiple: false
            hipposysedit:ordered: false
            hipposysedit:path: govscot:slug
            hipposysedit:primary: false
            hipposysedit:type: String
            hipposysedit:validators: [required, govscot-slug, publication-slug-spaces,
              publication-slug-dots]
          /displayDate:
            jcr:primaryType: hipposysedit:field
            hipposysedit:mandatory: false
            hipposysedit:multiple: false
            hipposysedit:ordered: false
            hipposysedit:path: govscot:displayDate
            hipposysedit:primary: false
            hipposysedit:type: Date
          /contentitemlanguage:
            jcr:primaryType: hipposysedit:field
            hipposysedit:mandatory: false
            hipposysedit:multiple: false
            hipposysedit:ordered: false
            hipposysedit:path: govscot:contentitemlanguage
            hipposysedit:primary: false
            hipposysedit:type: DynamicDropdown
          /group:
            jcr:primaryType: hipposysedit:field
            hipposysedit:mandatory: false
            hipposysedit:multiple: true
            hipposysedit:ordered: false
            hipposysedit:path: govscot:group
            hipposysedit:primary: false
            hipposysedit:type: hippo:mirror
          /featuredLinks:
            jcr:primaryType: hipposysedit:field
            hipposysedit:mandatory: false
            hipposysedit:multiple: false
            hipposysedit:ordered: false
            hipposysedit:path: govscot:featuredLinks
            hipposysedit:primary: false
            hipposysedit:type: govscot:FeaturedLinks
            hipposysedit:validators: [optional]
      /hipposysedit:prototypes:
        jcr:primaryType: hipposysedit:prototypeset
        /hipposysedit:prototype:
          jcr:primaryType: govscot:Publication
          hippostd:holder: holder
          hippostd:state: draft
          hippostdpubwf:createdBy: ''
          hippostdpubwf:lastModifiedBy: ''
          hippotranslation:id: document-type-locale-id
          hippotranslation:locale: document-type-locale
          jcr:mixinTypes: ['mix:referenceable']
          govscot:seoTitle: ''
          govscot:metaDescription: ''
          govscot:summary: ''
          govscot:isbn: ''
          govscot:title: ''
          jcr:uuid: 8ea2b207-fe3e-47a2-831e-31cd113454fb
          hippostdpubwf:lastModificationDate: 2018-03-16T14:27:32.591Z
          hippostdpubwf:creationDate: 2018-03-16T14:27:32.591Z
          govscot:publicationDate: 0001-01-01T12:00:00Z
          govscot:officialdate: 0001-01-01T12:00:00Z
          govscot:sme: ''
          govscot:slug: ''
          govscot:reportingTags: []
          govscot:displayDate: 0001-01-01T12:00:00Z
          govscot:contentitemlanguage: en
          govscot:publicationType: hipposysedit:prototype
          /govscot:content:
            jcr:primaryType: hippostd:html
            hippostd:content: ''
          /govscot:responsibleDirectorate:
            jcr:primaryType: hippo:mirror
            hippo:docbase: cafebabe-cafe-babe-cafe-babecafebabe
          /govscot:responsibleRole:
            jcr:primaryType: hippo:mirror
            hippo:docbase: cafebabe-cafe-babe-cafe-babecafebabe
          /govscot:contact:
            jcr:primaryType: hippostd:html
            hippostd:content: ''
          /govscot:epilogue:
            jcr:primaryType: hippostd:html
            hippostd:content: ''
          /govscot:group:
            jcr:primaryType: hippo:mirror
            hippo:docbase: cafebabe-cafe-babe-cafe-babecafebabe
          /govscot:featuredLinks:
            jcr:primaryType: govscot:FeaturedLinks
            govscot:label: ''
            /govscot:link:
              jcr:primaryType: govscot:DescribedLink
              govscot:description: ''
              /govscot:link:
                jcr:primaryType: hippo:mirror
                hippo:docbase: cafebabe-cafe-babe-cafe-babecafebabe
      /editor:templates:
        jcr:primaryType: editor:templateset
        /_default_:
          jcr:primaryType: frontend:plugincluster
          frontend:properties: [mode]
          frontend:references: [wicket.model, model.compareTo, engine, validator.id]
          frontend:services: [wicket.id, validator.id]
          /root:
            jcr:primaryType: frontend:plugin
            item: ${cluster.id}.field
            plugin.class: org.hippoecm.frontend.service.render.ListViewPlugin
          /title:
            jcr:primaryType: frontend:plugin
            caption: Title
            field: title
            hint: "The title is taken from the name of the folder. Use a maximum of 12 words and the format - subject: descriptor. For example, Income Tax reform: plans for 2027 to 2030"
            plugin.class: org.hippoecm.frontend.editor.plugins.field.PropertyFieldPlugin
            wicket.id: ${cluster.id}.field
            /cluster.options:
              jcr:primaryType: frontend:pluginconfig
          /slug:
            jcr:primaryType: frontend:plugin
            caption: Slug
            field: slug
            hint: "This is the url. It is auto-generated from the title."
            plugin.class: org.hippoecm.frontend.editor.plugins.field.PropertyFieldPlugin
            wicket.id: ${cluster.id}.field
            /cluster.options:
              jcr:primaryType: frontend:pluginconfig
          /summary:
            jcr:primaryType: frontend:plugin
            caption: Summary
            field: summary
            hint: 'Don’t duplicate the title. Add a short, one sentence description to explain the subject matter of the content item. No more than 40 words. The summary is used by the internal search.'
            plugin.class: org.hippoecm.frontend.editor.plugins.field.PropertyFieldPlugin
            wicket.id: ${cluster.id}.field
            /cluster.options:
              jcr:primaryType: frontend:pluginconfig
          /publicationType:
            jcr:primaryType: frontend:plugin
            caption: Publication type
            field: dynamicdropdown
            hint: 'Pre-populated.'
            plugin.class: org.hippoecm.frontend.editor.plugins.field.PropertyFieldPlugin
            wicket.id: ${cluster.id}.field
            /cluster.options:
              jcr:primaryType: frontend:pluginconfig
              source: /content/documents/govscot/valuelists/publicationTypes
          /isbn:
            jcr:primaryType: frontend:plugin
            caption: ISBN
            field: isbn
            hint: 'Ignore. It’s automatically filled for relevant APS publications.'
            plugin.class: org.hippoecm.frontend.editor.plugins.field.PropertyFieldPlugin
            wicket.id: ${cluster.id}.field
            /cluster.options:
              jcr:primaryType: frontend:pluginconfig
          /publicationDate:
            jcr:primaryType: frontend:plugin
            caption: Publication date
            field: publicationDate
            hint: 'Select the date and time that you will first publish the item.'
            plugin.class: org.hippoecm.frontend.editor.plugins.field.PropertyFieldPlugin
            wicket.id: ${cluster.id}.field
            /cluster.options:
              jcr:primaryType: frontend:pluginconfig
          /officialdate:
            jcr:primaryType: frontend:plugin
            caption: Official date
            field: officialdate
            hint: 'Ignore. Only use it if relates to an event date, for example when a speech was made.'
            plugin.class: org.hippoecm.frontend.editor.plugins.field.PropertyFieldPlugin
            wicket.id: ${cluster.id}.field
            /cluster.options:
              jcr:primaryType: frontend:pluginconfig
          /content:
            jcr:primaryType: frontend:plugin
            caption: Content
            field: content
            hint: 'Enter the content in this field if it’s a single page item. Leave blank if you are making a paged guide.'
            plugin.class: org.hippoecm.frontend.editor.plugins.field.NodeFieldPlugin
            wicket.id: ${cluster.id}.field
            /cluster.options:
              jcr:primaryType: frontend:pluginconfig
          /contact:
            jcr:primaryType: frontend:plugin
            caption: Contact details
            field: html_
            plugin.class: org.hippoecm.frontend.editor.plugins.field.NodeFieldPlugin
            wicket.id: ${cluster.id}.field
            hint: 'Enter the team contact details, use a generic team email or contactus@gov.scot'
            /cluster.options:
              jcr:primaryType: frontend:pluginconfig
          /epilogue:
            jcr:primaryType: frontend:plugin
            caption: Epilogue
            field: html
            hint: 'This content displays further down the page, below the main content field.'
            plugin.class: org.hippoecm.frontend.editor.plugins.field.NodeFieldPlugin
            wicket.id: ${cluster.id}.field
            /cluster.options:
              jcr:primaryType: frontend:pluginconfig
          /contentitemlanguage:
            jcr:primaryType: frontend:plugin
            caption: Content language
            field: contentitemlanguage
            hint: ''
            plugin.class: org.hippoecm.frontend.editor.plugins.field.PropertyFieldPlugin
            wicket.id: ${cluster.id}.field
            /cluster.options:
              jcr:primaryType: frontend:pluginconfig
              showDefault: 'false'
              source: /content/documents/govscot/valuelists/contentitemlanguages
          /responsibleDirectorate:
            jcr:primaryType: frontend:plugin
            caption: Primary responsible directorate
            field: responsibleDirectorate
            plugin.class: org.hippoecm.frontend.editor.plugins.field.NodeFieldPlugin
            wicket.id: ${cluster.id}.field
            hint: 'Select the main directorate responsible for this content.'
            /cluster.options:
              jcr:primaryType: frontend:pluginconfig
              base.path: /content/documents/govscot/about/how-government-is-run/directorates
              last.visited.enabled: 'false'
              nodetypes: govscot:Directorate
          /secondaryResponsibleDirectorate:
            jcr:primaryType: frontend:plugin
            caption: Secondary responsible directorate(s)
            field: secondaryResponsibleDirectorate
            hint: 'Select any additional responsible directorate(s).'
            plugin.class: org.hippoecm.frontend.editor.plugins.field.NodeFieldPlugin
            wicket.id: ${cluster.id}.field
            /cluster.options:
              jcr:primaryType: frontend:pluginconfig
              base.path: /content/documents/govscot/about/how-government-is-run/directorates
              last.visited.enabled: 'false'
              nodetypes: govscot:Directorate
          /topics:
            jcr:primaryType: frontend:plugin
            caption: Topics and issues
            field: topics
            hint: 'Select one or more relevant topics or issues e.g. Economy, Energy.'
            plugin.class: org.hippoecm.frontend.editor.plugins.field.NodeFieldPlugin
            wicket.id: ${cluster.id}.field
            /cluster.options:
              jcr:primaryType: frontend:pluginconfig
              base.path: /content/documents/govscot/topics/
              last.visited.enabled: 'false'
              nodetypes: ['govscot:Topic', 'govscot:Issue', 'govscot:DynamicIssue']
          /responsibleRole:
            jcr:primaryType: frontend:plugin
            caption: Primary responsible role
            field: responsibleRole
            plugin.class: org.hippoecm.frontend.editor.plugins.field.NodeFieldPlugin
            wicket.id: ${cluster.id}.field
            hint: 'Select the lead ministerial or primary role responsible e.g. Cabinet Secretary for ...'
            /cluster.options:
              jcr:primaryType: frontend:pluginconfig
              last.visited.enabled: 'false'
              base.path: /content/documents/govscot/about/
              nodetypes: ['govscot:Role', 'govscot:Person', 'govscot:FeaturedRole']
          /secondaryResponsibleRole:
            jcr:primaryType: frontend:plugin
            caption: Secondary responsible role(s)
            field: secondaryResponsibleRole
            hint: 'Select any secondary responsible role(s) for this content item e.g. Minister for ...'
            plugin.class: org.hippoecm.frontend.editor.plugins.field.NodeFieldPlugin
            wicket.id: ${cluster.id}.field
            /cluster.options:
              jcr:primaryType: frontend:pluginconfig
              last.visited.enabled: 'false'
              base.path: /content/documents/govscot/about/
              nodetypes: ['govscot:Role', 'govscot:Person', 'govscot:FeaturedRole']
          /group:
            jcr:primaryType: frontend:plugin
            caption: Group(s)
            field: group
            plugin.class: org.hippoecm.frontend.editor.plugins.field.NodeFieldPlugin
            wicket.id: ${cluster.id}.field
            hint: 'Link this publication to a group page. This will make it appear on the group page and link to the group from the publications page.'
            /cluster.options:
              jcr:primaryType: frontend:pluginconfig
              nodetypes: govscot:Group
              base.path: /content/documents/govscot/groups/
          /seoTitle:
            jcr:primaryType: frontend:plugin
            caption: SEO title
            field: seoTitle
            hint: 'Used by search engines and social media. Maximum 60 characters.'
            plugin.class: org.hippoecm.frontend.editor.plugins.field.PropertyFieldPlugin
            wicket.id: ${cluster.id}.field
            /cluster.options:
              jcr:primaryType: frontend:pluginconfig
              maxlength: '60'
          /metaDescription:
            jcr:primaryType: frontend:plugin
            caption: Meta description
            field: metaDescription
            hint: 'Used for search engine indexing. Maximum 40 words.'
            plugin.class: org.hippoecm.frontend.editor.plugins.field.PropertyFieldPlugin
            wicket.id: ${cluster.id}.field
            /cluster.options:
              jcr:primaryType: frontend:pluginconfig
              maxlength: '300'
          /updateHistory:
            jcr:primaryType: frontend:plugin
            caption: Update History
            field: UpdateHistory
            hint: 'To be used if content is updated after the original publication date. Add the date and a brief description of what changed. This will display on the content item.'
            plugin.class: scot.gov.plugins.field.ExtendedNodeFieldPlugin
            wicket.id: ${cluster.id}.field
            /cluster.options:
              jcr:primaryType: frontend:pluginconfig
          /tags:
            jcr:primaryType: frontend:plugin
            mixin: hippostd:taggable
            plugin.class: org.hippoecm.frontend.editor.plugins.mixin.MixinLoaderPlugin
            wicket.id: ${cluster.id}.field
            hint: 'Tags are used to inform the internal search. Enter all the tags relevant to this content. Use lower case. One tag per line using the ‘+ Add’ button.'
            /cluster.options:
              jcr:primaryType: frontend:pluginconfig
          /notes:
            jcr:primaryType: frontend:plugin
            caption: Notes
            field: notes
            hint: 'For internal purposes. Use for additional information about this content.'
            plugin.class: org.hippoecm.frontend.editor.plugins.field.NodeFieldPlugin
            wicket.id: ${cluster.id}.field
            /cluster.options:
              jcr:primaryType: frontend:pluginconfig
          /sme:
            jcr:primaryType: frontend:plugin
            caption: Subject matter expert / policy contact
            field: sme
            hint: 'For internal purposes. Enter the relevant expert or policy contact details.'
            plugin.class: org.hippoecm.frontend.editor.plugins.field.PropertyFieldPlugin
            wicket.id: ${cluster.id}.field
            /cluster.options:
              jcr:primaryType: frontend:pluginconfig
          /reportingTags:
            jcr:primaryType: frontend:plugin
            caption: Reporting Tags
            field: reportingTags
            hint: 'Ignore this field.'
            multiselect.type: palette
            palette.alloworder: false
            palette.maxrows: '8'
            plugin.class: org.onehippo.forge.selection.frontend.plugin.DynamicMultiSelectPlugin
            selectlist.maxrows: '8'
            valuelist.provider: service.valuelist.default
            wicket.id: ${cluster.id}.field
            /cluster.options:
              jcr:primaryType: frontend:pluginconfig
              source: /content/documents/govscot/valuelists/reportingTags
          /displayDate:
            jcr:primaryType: frontend:plugin
            caption: Display date
            field: displayDate
            hint: 'Used to sort and filter publications. Also used as the date present in search results.'
            plugin.class: org.hippoecm.frontend.editor.plugins.field.PropertyFieldPlugin
            wicket.id: ${cluster.id}.field
            mode: view
            /cluster.options:
              jcr:primaryType: frontend:pluginconfig
          /featuredLinks:
            jcr:primaryType: frontend:plugin
            caption: Featured links
            field: featuredLinks
            plugin.class: org.hippoecm.frontend.editor.plugins.field.NodeFieldPlugin
            wicket.id: ${cluster.id}.field
            hint: ''
            /cluster.options:
              jcr:primaryType: frontend:pluginconfig
